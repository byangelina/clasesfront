<!DOCTYPE html>
<html lang="es"> <!-- lang="es" indica que el contenido está en español -->
<head> <!-- metadatos -->
    <meta charset="UTF-8"> <!-- UTF-8 permite usar tildes, ñ, y caracteres especiales -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- MUY IMPORTANTE para diseño responsive -->
    <title>Document</title> <!-- Texto que aparece en la pestaña del navegador -->
</head>

<!-- ENCABEZADO: aparece en todas las páginas -------------------------------------------------------------------------------------------------------------------------->
    <header>
        <h1>Mi Sitio Web</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="about.html">Acerca de</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
        </nav>
    </header>
<!--
header El Encabezado
- ¿Qué es? La zona superior de tu página
- ¿Qué va aquí?
- Logo de tu sitio
- Menú de navegación principal
- Título del sitio
- ¿Cuándo usarlo? En la mayoría de páginas web
- ¿Siempre se usa? Casi siempre. Es muy común.
-->



<!-- CONTENIDO PRINCIPAL: único en cada página ----------------------------------------------------------------------------------------------------------------------->
    <main>
        <h2>Bienvenida a mi página</h2>
        <p>Este es el contenido principal de mi sitio.</p>
    </main>
<!-- main Contenido Principal
- ¿Qué es? El contenido único de cada página
- ¿Qué va aquí? Lo más importante de esa página específica
- Regla de oro: Solo debe haber UN <main> por página
- ¿Siempre se usa? Sí, es una buena práctica siempre incluirlo
--> 



<!-- PIE DE PÁGINA: información de cierre ---------------------------------------------------------------------------------------------------------------------------->
    <footer>
        <p>&copy; 2026 Mi Sitio Web. Todos los derechos reservados.</p>
    </footer>

<!-- footer Pie de Página
- ¿Qué es? Zona inferior de tu página
- ¿Qué va aquí?
- Copyright (©)
- Enlaces legales (Privacidad, Términos)
- Redes sociales
- Información de contacto
- ¿Cuándo usarlo? En casi todas las páginas
-->
